<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your ApexStore account to manage your shopping cart and place orders.">
  <title>Apex Store | Log In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Loader Overlay -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Header Navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        <span>ApexStore</span>
      </a>
      <nav class="nav-menu" id="nav-auth">
        <!-- Filled dynamically by auth.js based on session state -->
      </nav>
    </div>
  </header>

  <!-- Login Form Workspace -->
  <main class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your email and password to log in.</p>
      
      <form id="login-form">
        <div id="login-error-alert" class="error-alert" style="display: none; background: #FEF2F2; color: #DC2626; border: 1px solid #FCA5A5; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.9rem;">
          <!-- Placeholder for error messages -->
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-submit">Sign In</button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="register.html">Sign up now</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="footer-container">
      <p>&copy; 2026 ApexStore Inc. All rights reserved.</p>
    </div>
  </footer>

  <!-- Javascript Modules -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <!-- Page Bootstrapping and Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if user is already logged in
      if (isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      const form = document.getElementById('login-form');
      const errorAlert = document.getElementById('login-error-alert');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorAlert.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Clientside email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          errorAlert.textContent = 'Please enter a valid email address.';
          errorAlert.style.display = 'block';
          return;
        }

        if (password.length < 6) {
          errorAlert.textContent = 'Password must be at least 6 characters.';
          errorAlert.style.display = 'block';
          return;
        }

        try {
          // Perform login fetch request via central API handler
          const result = await apiFetch('/auth/login', 'POST', { email, password });
          
          saveToken(result.token);
          showToast('Welcome back! Logged in successfully.', 'success');
          
          // Redirect to index page after a short duration
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        } catch (err) {
          errorAlert.textContent = err.message || 'Invalid email or password.';
          errorAlert.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
